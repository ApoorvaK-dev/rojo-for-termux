name: Build Rbxcloud for Termux (ARM64)

on: [workflow_dispatch] 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clone Rbxcloud Source Code
        uses: actions/checkout@v4
        with:
          repository: Sleitnick/rbxcloud
          
      - name: Install Cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build Statically Linked Rbxcloud
        run: cross build --release --target aarch64-unknown-linux-musl

      - name: Upload Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rbxcloud-termux-binary
          path: target/aarch64-unknown-linux-musl/release/rbxcloud
          
